name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do, and where does Conduit get in the way today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like Conduit to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you're using now, or other approaches you weighed.
  - type: input
    id: clients
    attributes:
      label: Which clients or servers does this involve?
      description: Helps gauge scope (e.g. a specific AI client or MCP server).
