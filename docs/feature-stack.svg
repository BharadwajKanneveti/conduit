<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title>Conduit connects your AI tools to popular MCP servers</title>
  <desc>AI clients like Claude, Cursor and VS Code connect through the Conduit gateway to popular MCP servers like GitHub, Stripe, Supabase and Vercel.</desc>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#34d399"/></marker>
  </defs>
  <rect x="1" y="1" width="1198" height="598" rx="24" fill="#0b0b0e" stroke="rgba(255,255,255,0.08)"/>

  <!-- header -->
  <g transform="translate(56,38)">
    <rect width="44" height="44" rx="11" fill="#34d399"/>
    <g fill="none" stroke="#06140e" stroke-width="2.9" stroke-linecap="round" transform="scale(0.92)">
      <path d="M33.6 12.5 A 15 15 0 1 0 33.6 35.5"/>
      <path d="M30.2 16.7 A 9.4 9.4 0 1 0 30.2 31.3"/>
      <circle cx="33" cy="24" r="2.7" fill="#06140e" stroke="none"/>
    </g>
    <text x="58" y="31" font-size="30" font-weight="600" fill="#f5f5f7">Conduit</text>
  </g>
  <text x="1144" y="68" text-anchor="end" font-size="17" fill="#a1a1aa" font-family="ui-monospace, Menlo, monospace">one gateway for your whole stack</text>

  <!-- column labels -->
  <text x="185" y="132" text-anchor="middle" font-size="13" fill="#6f6f78" font-family="ui-monospace, Menlo, monospace">your AI tools</text>
  <text x="942" y="132" text-anchor="middle" font-size="13" fill="#6f6f78" font-family="ui-monospace, Menlo, monospace">popular MCP servers</text>

  <!-- connectors -->
  <line x1="300" y1="288" x2="512" y2="288" stroke="#34d399" stroke-width="2.5" opacity="0.7" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line x1="600" y1="288" x2="740" y2="288" stroke="#34d399" stroke-width="2.5" opacity="0.7" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- left: AI clients -->
  <g font-size="17" font-weight="500" fill="#e4e4e7">
    <g><rect x="80" y="150" width="210" height="44" rx="10" fill="#131318" stroke="rgba(255,255,255,0.1)"/><text x="100" y="178">Claude</text></g>
    <g><rect x="80" y="208" width="210" height="44" rx="10" fill="#131318" stroke="rgba(255,255,255,0.1)"/><text x="100" y="236">Cursor</text></g>
    <g><rect x="80" y="266" width="210" height="44" rx="10" fill="#131318" stroke="rgba(255,255,255,0.1)"/><text x="100" y="294">VS Code</text></g>
    <g><rect x="80" y="324" width="210" height="44" rx="10" fill="#131318" stroke="rgba(255,255,255,0.1)"/><text x="100" y="352">Codex</text></g>
    <g><rect x="80" y="382" width="210" height="44" rx="10" fill="#131318" stroke="rgba(255,255,255,0.1)"/><text x="100" y="410">Windsurf</text></g>
  </g>

  <!-- gateway -->
  <rect x="524" y="256" width="64" height="64" rx="16" fill="#34d399"/>
  <g transform="translate(524,256) scale(1.33)" fill="none" stroke="#06140e" stroke-width="2.9" stroke-linecap="round">
    <path d="M33.6 12.5 A 15 15 0 1 0 33.6 35.5"/>
    <path d="M30.2 16.7 A 9.4 9.4 0 1 0 30.2 31.3"/>
    <circle cx="33" cy="24" r="2.7" fill="#06140e" stroke="none"/>
  </g>
  <text x="556" y="344" text-anchor="middle" font-size="13" fill="#a1a1aa" font-family="ui-monospace, Menlo, monospace">Conduit</text>

  <!-- right: servers -->
  <g font-size="17" font-weight="500" fill="#e4e4e7">
    <g><rect x="750" y="150" width="186" height="44" rx="10" fill="#131318" stroke="rgba(255,255,255,0.1)"/><text x="770" y="178">GitHub</text></g>
    <g><rect x="948" y="150" width="186" height="44" rx="10" fill="#131318" stroke="rgba(255,255,255,0.1)"/><text x="968" y="178">Stripe</text></g>
    <g><rect x="750" y="208" width="186" height="44" rx="10" fill="#131318" stroke="rgba(255,255,255,0.1)"/><text x="770" y="236">Supabase</text></g>
    <g><rect x="948" y="208" width="186" height="44" rx="10" fill="#131318" stroke="rgba(255,255,255,0.1)"/><text x="968" y="236">Vercel</text></g>
    <g><rect x="750" y="266" width="186" height="44" rx="10" fill="#131318" stroke="rgba(255,255,255,0.1)"/><text x="770" y="294">Linear</text></g>
    <g><rect x="948" y="266" width="186" height="44" rx="10" fill="#131318" stroke="rgba(255,255,255,0.1)"/><text x="968" y="294">Notion</text></g>
    <g><rect x="750" y="324" width="186" height="44" rx="10" fill="#131318" stroke="rgba(255,255,255,0.1)"/><text x="770" y="352">Sentry</text></g>
    <g><rect x="948" y="324" width="186" height="44" rx="10" fill="#131318" stroke="rgba(255,255,255,0.1)"/><text x="968" y="352">Cloudflare</text></g>
  </g>

  <!-- tagline -->
  <line x1="56" y1="456" x2="1144" y2="456" stroke="rgba(255,255,255,0.08)"/>
  <text x="600" y="508" text-anchor="middle" font-size="28" font-weight="600" fill="#f5f5f7">Connect once. Every AI tool reaches every server.</text>
  <text x="600" y="542" text-anchor="middle" font-size="16" fill="#a1a1aa">Keys in your OS keychain. No Docker, no cloud.</text>
</svg>
