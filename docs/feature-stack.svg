<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Poppins, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title>Toolport connects your AI tools to popular MCP servers</title>
  <desc>AI clients like Claude, Cursor and VS Code connect through the Toolport gateway to popular MCP servers like GitHub, Stripe, Supabase and Vercel.</desc>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#F97316"/></marker>
  </defs>
  <rect x="1" y="1" width="1198" height="598" rx="24" fill="#1E3A66" stroke="rgba(255,255,255,0.10)"/>

  <!-- header: porthole mark + wordmark -->
  <g transform="translate(56,40)">
    <circle cx="18" cy="18" r="16" fill="none" stroke="#FFFFFF" stroke-width="7"/>
    <circle cx="18" cy="2"  r="2.6" fill="#FFFFFF"/>
    <circle cx="34" cy="18" r="2.6" fill="#FFFFFF"/>
    <circle cx="18" cy="34" r="2.6" fill="#FFFFFF"/>
    <circle cx="2"  cy="18" r="2.6" fill="#FFFFFF"/>
    <circle cx="18" cy="18" r="4.5" fill="#F97316"/>
    <text x="50" y="27" font-size="30" font-weight="600" fill="#FFFFFF">Toolport</text>
  </g>
  <text x="1144" y="68" text-anchor="end" font-size="17" fill="#9db0cc" font-family="ui-monospace, Menlo, monospace">one gateway for your whole stack</text>

  <!-- column labels -->
  <text x="185" y="132" text-anchor="middle" font-size="13" fill="#9db0cc" font-family="ui-monospace, Menlo, monospace">your AI tools</text>
  <text x="942" y="132" text-anchor="middle" font-size="13" fill="#9db0cc" font-family="ui-monospace, Menlo, monospace">popular MCP servers</text>

  <!-- connectors -->
  <line x1="300" y1="288" x2="512" y2="288" stroke="#F97316" stroke-width="2.5" opacity="0.8" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line x1="600" y1="288" x2="740" y2="288" stroke="#F97316" stroke-width="2.5" opacity="0.8" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- left: AI clients -->
  <g font-size="17" font-weight="500" fill="#e8eef7">
    <g><rect x="80" y="150" width="210" height="44" rx="10" fill="#16294A" stroke="rgba(255,255,255,0.12)"/><text x="100" y="178">Claude</text></g>
    <g><rect x="80" y="208" width="210" height="44" rx="10" fill="#16294A" stroke="rgba(255,255,255,0.12)"/><text x="100" y="236">Cursor</text></g>
    <g><rect x="80" y="266" width="210" height="44" rx="10" fill="#16294A" stroke="rgba(255,255,255,0.12)"/><text x="100" y="294">VS Code</text></g>
    <g><rect x="80" y="324" width="210" height="44" rx="10" fill="#16294A" stroke="rgba(255,255,255,0.12)"/><text x="100" y="352">Codex</text></g>
    <g><rect x="80" y="382" width="210" height="44" rx="10" fill="#16294A" stroke="rgba(255,255,255,0.12)"/><text x="100" y="410">Windsurf</text></g>
  </g>

  <!-- gateway: porthole mark -->
  <circle cx="556" cy="288" r="26" fill="none" stroke="#FFFFFF" stroke-width="10"/>
  <circle cx="556" cy="262" r="4" fill="#FFFFFF"/>
  <circle cx="582" cy="288" r="4" fill="#FFFFFF"/>
  <circle cx="556" cy="314" r="4" fill="#FFFFFF"/>
  <circle cx="530" cy="288" r="4" fill="#FFFFFF"/>
  <circle cx="556" cy="288" r="8" fill="#F97316"/>
  <text x="556" y="356" text-anchor="middle" font-size="13" fill="#9db0cc" font-family="ui-monospace, Menlo, monospace">Toolport</text>

  <!-- right: servers -->
  <g font-size="17" font-weight="500" fill="#e8eef7">
    <g><rect x="750" y="150" width="186" height="44" rx="10" fill="#16294A" stroke="rgba(255,255,255,0.12)"/><text x="770" y="178">GitHub</text></g>
    <g><rect x="948" y="150" width="186" height="44" rx="10" fill="#16294A" stroke="rgba(255,255,255,0.12)"/><text x="968" y="178">Stripe</text></g>
    <g><rect x="750" y="208" width="186" height="44" rx="10" fill="#16294A" stroke="rgba(255,255,255,0.12)"/><text x="770" y="236">Supabase</text></g>
    <g><rect x="948" y="208" width="186" height="44" rx="10" fill="#16294A" stroke="rgba(255,255,255,0.12)"/><text x="968" y="236">Vercel</text></g>
    <g><rect x="750" y="266" width="186" height="44" rx="10" fill="#16294A" stroke="rgba(255,255,255,0.12)"/><text x="770" y="294">Linear</text></g>
    <g><rect x="948" y="266" width="186" height="44" rx="10" fill="#16294A" stroke="rgba(255,255,255,0.12)"/><text x="968" y="294">Notion</text></g>
    <g><rect x="750" y="324" width="186" height="44" rx="10" fill="#16294A" stroke="rgba(255,255,255,0.12)"/><text x="770" y="352">Sentry</text></g>
    <g><rect x="948" y="324" width="186" height="44" rx="10" fill="#16294A" stroke="rgba(255,255,255,0.12)"/><text x="968" y="352">Cloudflare</text></g>
  </g>

  <!-- tagline -->
  <line x1="56" y1="456" x2="1144" y2="456" stroke="rgba(255,255,255,0.12)"/>
  <text x="600" y="508" text-anchor="middle" font-size="28" font-weight="600" fill="#FFFFFF">Connect once. Every AI tool reaches every server.</text>
  <text x="600" y="542" text-anchor="middle" font-size="16" fill="#9db0cc">Keys in your OS keychain. No Docker, no cloud.</text>
</svg>
